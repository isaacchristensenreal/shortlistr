<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1200px;
      height: 1200px;
      overflow: hidden;
      background: #0A0A0F;
    }

    .ad {
      width: 1200px;
      height: 1200px;
      background: #0A0A0F;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      position: relative;
      overflow: hidden;
    }

    /* ── Background depth ── */
    .orb-gold {
      position: absolute;
      width: 700px; height: 700px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(245,200,66,0.10) 0%, transparent 65%);
      top: -180px; right: -180px;
      pointer-events: none;
    }
    .orb-blue {
      position: absolute;
      width: 600px; height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(59,130,246,0.14) 0%, transparent 65%);
      bottom: -120px; left: -120px;
      pointer-events: none;
    }
    .grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }

    /* ── Layout ── */
    .content {
      position: relative;
      z-index: 2;
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 72px 80px 64px;
    }

    /* ── Top bar ── */
    .topbar {
      display: flex;
      align-items: center;
      gap: 18px;
    }
    .logo-mark {
      width: 60px; height: 60px;
      border-radius: 15px;
      background: linear-gradient(135deg, #2563eb 0%, #3b82f6 50%, #6366f1 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 28px rgba(59,130,246,0.45);
      flex-shrink: 0;
    }
    .brand {
      font-size: 38px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.5px;
    }
    .badge {
      margin-left: auto;
      background: rgba(245,200,66,0.12);
      border: 1px solid rgba(245,200,66,0.25);
      color: #F5C842;
      font-size: 15px;
      font-weight: 700;
      padding: 6px 16px;
      border-radius: 999px;
      letter-spacing: 0.5px;
    }

    /* ── Score hero ── */
    .score-hero {
      display: flex;
      align-items: center;
      gap: 48px;
      margin: 64px 0 56px;
    }
    .score-ring-wrap {
      position: relative;
      width: 200px; height: 200px;
      flex-shrink: 0;
    }
    .score-ring-wrap svg {
      transform: rotate(-90deg);
    }
    .score-center {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .score-number {
      font-size: 58px;
      font-weight: 900;
      color: #F5C842;
      letter-spacing: -2px;
      line-height: 1;
    }
    .score-pct {
      font-size: 22px;
      font-weight: 700;
      color: rgba(245,200,66,0.6);
      margin-top: -2px;
    }
    .score-info {
    }
    .score-label {
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2.5px;
      color: rgba(255,255,255,0.3);
      margin-bottom: 10px;
    }
    .score-title {
      font-size: 34px;
      font-weight: 800;
      color: #fff;
      line-height: 1.15;
      margin-bottom: 10px;
    }
    .score-desc {
      font-size: 17px;
      color: rgba(255,255,255,0.4);
      line-height: 1.5;
      max-width: 400px;
    }

    /* ── Divider ── */
    .divider {
      height: 1px;
      background: rgba(255,255,255,0.07);
      margin-bottom: 52px;
    }

    /* ── Headline ── */
    .headline {
      font-size: 84px;
      font-weight: 900;
      color: #fff;
      line-height: 1.02;
      letter-spacing: -3px;
      margin-bottom: 28px;
    }
    .headline .gold { color: #F5C842; }

    /* ── Features ── */
    .features {
      display: flex;
      gap: 20px;
      margin-bottom: 56px;
      flex-wrap: wrap;
    }
    .feat {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 14px;
      padding: 14px 22px;
    }
    .feat-check {
      width: 24px; height: 24px;
      background: rgba(245,200,66,0.15);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .feat-text {
      font-size: 19px;
      font-weight: 600;
      color: rgba(255,255,255,0.75);
    }

    /* ── Bottom row ── */
    .bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: auto;
    }
    .cta {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: linear-gradient(135deg, #F5C842 0%, #d4a017 100%);
      color: #0A0A0F;
      font-size: 26px;
      font-weight: 800;
      padding: 22px 44px;
      border-radius: 16px;
      letter-spacing: -0.3px;
    }
    .url {
      font-size: 21px;
      font-weight: 600;
      color: rgba(255,255,255,0.2);
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <div class="ad">
    <div class="orb-gold"></div>
    <div class="orb-blue"></div>
    <div class="grid"></div>

    <div class="content">

      <!-- Top bar -->
      <div class="topbar">
        <div class="logo-mark">
          <svg width="38" height="38" viewBox="0 0 24 24" fill="none">
            <rect x="2" y="2" width="14" height="18" rx="2" fill="white" fill-opacity="0.22" stroke="white" stroke-opacity="0.55" stroke-width="1.2"/>
            <rect x="5" y="7" width="8" height="1.5" rx="0.75" fill="white" fill-opacity="0.90"/>
            <rect x="5" y="11" width="5" height="1.5" rx="0.75" fill="white" fill-opacity="0.65"/>
            <rect x="5" y="15" width="7" height="1.5" rx="0.75" fill="white" fill-opacity="0.50"/>
            <path d="M18 2L13 12H17L12 22L23 10H19L18 2Z" fill="white"/>
          </svg>
        </div>
        <span class="brand">ShortListr</span>
        <span class="badge">AI Resume Optimizer</span>
      </div>

      <!-- Score hero -->
      <div class="score-hero">
        <!-- Ring: r=90, circumference=565.5, 94%=531.6, gap=33.9 -->
        <div class="score-ring-wrap">
          <svg width="200" height="200" viewBox="0 0 200 200">
            <circle cx="100" cy="100" r="85" fill="none" stroke="rgba(245,200,66,0.10)" stroke-width="14"/>
            <circle cx="100" cy="100" r="85" fill="none"
              stroke="#F5C842" stroke-width="14"
              stroke-linecap="round"
              stroke-dasharray="503.9 30.0"
              transform="rotate(-90 100 100)"/>
          </svg>
          <div class="score-center">
            <span class="score-number">94</span>
            <span class="score-pct">%</span>
          </div>
        </div>
        <div class="score-info">
          <div class="score-label">ATS Match Score</div>
          <div class="score-title">Your resume,<br>job-ready in 60s</div>
          <div class="score-desc">Paste any job description. AI analyzes the gap and rewrites your resume to match.</div>
        </div>
      </div>

      <div class="divider"></div>

      <!-- Headline -->
      <div class="headline">Beat the ATS.<br><span class="gold">Get the Interview.</span></div>

      <!-- Features -->
      <div class="features">
        <div class="feat">
          <div class="feat-check">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#F5C842" stroke-width="3.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
            </svg>
          </div>
          <span class="feat-text">ATS Keyword Matching</span>
        </div>
        <div class="feat">
          <div class="feat-check">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#F5C842" stroke-width="3.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
            </svg>
          </div>
          <span class="feat-text">AI Bullet Rewriting</span>
        </div>
        <div class="feat">
          <div class="feat-check">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#F5C842" stroke-width="3.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
            </svg>
          </div>
          <span class="feat-text">Cover Letter Generator</span>
        </div>
      </div>

      <!-- Bottom row -->
      <div class="bottom">
        <div class="cta">
          Start Free
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#0A0A0F" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M13 7l5 5m0 0l-5 5m5-5H6"/>
          </svg>
        </div>
        <span class="url">shortlistr.us</span>
      </div>

    </div>
  </div>
</body>
</html>
