<svg width="1000" height="1000" viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#2563eb"/>
      <stop offset="50%"  stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="28" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0 0 0 0 0.231
                0 0 0 0 0.408
                0 0 0 0 0.949
                0 0 0 0.55 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Logo rounded square — 800×800 centered with 100px padding -->
  <rect x="100" y="100" width="800" height="800" rx="180" fill="url(#logoGrad)" filter="url(#glow)"/>

  <!--
    Inner icon: viewBox 0 0 24 24, rendered at 65% of 800 = 520px
    Offset inside container: (800-520)/2 = 140 → absolute: 100+140 = 240
    Scale: 520/24 = 21.667
  -->
  <g transform="translate(240,240) scale(21.667)">
    <!-- Document body -->
    <rect x="2" y="2" width="14" height="18" rx="2"
          fill="white" fill-opacity="0.22"
          stroke="white" stroke-opacity="0.55" stroke-width="1.2"/>
    <!-- Resume text lines -->
    <rect x="5" y="7"  width="8" height="1.5" rx="0.75" fill="white" fill-opacity="0.90"/>
    <rect x="5" y="11" width="5" height="1.5" rx="0.75" fill="white" fill-opacity="0.65"/>
    <rect x="5" y="15" width="7" height="1.5" rx="0.75" fill="white" fill-opacity="0.50"/>
    <!-- Lightning bolt (AI transformation) -->
    <path d="M18 2L13 12H17L12 22L23 10H19L18 2Z" fill="white"/>
  </g>
</svg>
