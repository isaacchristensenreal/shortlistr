<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A1408"/>
      <stop offset="100%" stop-color="#0D0D14"/>
    </linearGradient>
    <radialGradient id="glow" cx="75%" cy="25%" r="55%">
      <stop offset="0%" stop-color="#F5C842" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#F5C842" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Dark background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- Subtle gold ambient glow -->
  <rect width="32" height="32" rx="7" fill="url(#glow)"/>

  <!-- Icon scaled from 24×24 source, centered with 3px padding -->
  <g transform="translate(3,3) scale(1.0833)">
    <!-- Document body -->
    <rect x="2" y="2" width="14" height="18" rx="2"
      fill="white" fill-opacity="0.12"
      stroke="white" stroke-opacity="0.3" stroke-width="1.2"/>
    <!-- Resume text lines -->
    <rect x="5" y="7"  width="8"   height="1.5" rx="0.75" fill="white" fill-opacity="0.75"/>
    <rect x="5" y="11" width="5"   height="1.5" rx="0.75" fill="white" fill-opacity="0.55"/>
    <rect x="5" y="15" width="6.5" height="1.5" rx="0.75" fill="white" fill-opacity="0.45"/>
    <!-- Lightning bolt — gold -->
    <path d="M18 2L13 12H17L12 22L23 10H19L18 2Z" fill="#F5C842"/>
  </g>
</svg>
